<!doctype html>
<html dir="ltr" lang="sk">
  <head>
    <base href="/" />

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <title>Nemocničný systém</title>

    <script type="module" src="/build/davgus-ambulance-ufe.esm.js"></script>
    <script nomodule src="/build/davgus-ambulance-ufe.js"></script>

    <style>
      :root {
        --md-sys-color-primary: #1565c0;
        --md-sys-color-on-primary: #ffffff;
        --md-sys-color-primary-container: #d1e4ff;
        --md-sys-color-on-primary-container: #001d36;
        --md-sys-color-secondary: #535f70;
        --md-sys-color-on-secondary: #ffffff;
        --md-sys-color-secondary-container: #d7e3f7;
        --md-sys-color-on-secondary-container: #101c2b;
        --md-sys-color-tertiary: #1565c0;
        --md-sys-color-surface: #f8f9ff;
        --md-sys-color-on-surface: #191c20;
        --md-sys-color-on-surface-variant: #44474f;
        --md-sys-color-surface-container: #ecedf4;
        --md-sys-color-surface-container-low: #f2f3fa;
        --md-sys-color-surface-container-high: #e6e8ee;
        --md-sys-color-surface-container-highest: #dee3eb;
        --md-sys-color-outline: #73777f;
        --md-sys-color-outline-variant: #c3c7cf;
        --md-sys-color-error: #ba1a1a;

        --md-ref-typeface-plain: 'Roboto', sans-serif;
        --md-ref-typeface-brand: 'Roboto', sans-serif;

        --md-filled-text-field-container-color: #e8eef7;
        --md-filled-text-field-focus-active-indicator-color: #1565c0;
        --md-filled-text-field-hover-active-indicator-color: #1565c0;
        --md-filled-text-field-focus-label-text-color: #1565c0;
        --md-filled-text-field-active-indicator-color: #90a4c4;
        --md-filled-text-field-label-text-color: #44474f;
        --md-filled-text-field-input-text-color: #191c20;
        --md-filled-text-field-leading-icon-color: #1565c0;

        --md-filled-select-text-field-container-color: #e8eef7;
        --md-filled-select-text-field-focus-active-indicator-color: #1565c0;
        --md-filled-select-text-field-hover-active-indicator-color: #1565c0;
        --md-filled-select-text-field-focus-label-text-color: #1565c0;
        --md-filled-select-text-field-active-indicator-color: #90a4c4;
        --md-filled-select-text-field-input-text-color: #191c20;
        --md-filled-select-text-field-leading-icon-color: #1565c0;

        --md-filled-button-container-color: #1565c0;
        --md-filled-button-label-text-color: #ffffff;

        --md-outlined-button-outline-color: #1565c0;
        --md-outlined-button-label-text-color: #1565c0;

        --md-filled-tonal-button-container-color: #d1e4ff;
        --md-filled-tonal-button-label-text-color: #001d36;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: 'Roboto', sans-serif;
        background: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
      }

      davgus-ambulance-wl-app {
        display: block;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <davgus-ambulance-wl-app base-path="/" api-base="http://localhost:5500/api" base-path="/ambulance-wl/"></davgus-ambulance-wl-app>
  </body>
</html>
